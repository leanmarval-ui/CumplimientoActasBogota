name: Procesar reuniones proyectos

on:
  push:
    paths:
      - "input/Reuniones.xlsx"
  workflow_dispatch:

concurrency:
  group: actualizacion-repo
  cancel-in-progress: false

jobs:
  procesar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 🔥 IMPORTANTE para evitar errores de push

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install pandas numpy openpyxl matplotlib

      # =========================
      # 🔥 PROCESO COMPLETO
      # =========================

      - name: Ejecutar main (genera outputs + gráfica)
        run: python scripts/main.py

      - name: Generar JSON (para el dashboard)
        run: python scripts/generar_json.py

      # =========================
      # 📦 VERIFICACIÓN
      # =========================

      - name: Verificar archivos generados
        run: |
          echo "Contenido carpeta output:"
          ls -la output

      # =========================
      # 🚀 GUARDAR CAMBIOS
      # =========================

      - name: Commit y push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add output/*

          git diff --cached --quiet || git commit -m "Actualizar outputs y JSON"

          git pull --rebase origin main || true
          git push || true
