name: Procesar reuniones proyectos
 
on:
  push:
    paths:
      - "input/Reuniones.xlsx"
  workflow_dispatch:
 
jobs:
  procesar:
    runs-on: ubuntu-latest
 
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sincronizar con repo remoto
        run: |
          git pull origin main --rebase

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Instalar dependencias
        run: |
          pip install pandas numpy openpyxl matplotlib
 
      - name: Ejecutar scripts
        run: |
          python scripts/main.py
          python scripts/generar_json.py
 
      - name: Guardar resultados en el repositorio
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add output/*
          git diff --cached --quiet || git commit -m "Actualizar resultados reuniones"

          git push origin main
