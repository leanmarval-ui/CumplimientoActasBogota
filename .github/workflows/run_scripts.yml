name: EjecutarScripts

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/**'
      - 'output/**'

jobs:
  run-python:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: pip install pandas openpyxl matplotlib

      - name: Ejecutar main
        run: python scripts/main.py

      - name: Ejecutar JSON
        run: python scripts/generar_json.py

      - name: Guardar cambios (FORZADO)
        run: |
          git add .
          git commit -m "Actualiza outputs" || echo "Sin cambios"
          git pull origin main --rebase
          git push origin main

          git push origin main
